spring.application.name=expense-tracker

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/expense_tracker
spring.datasource.username=postgres
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=8080
# JWT Configuration
jwt.secret=your-secret-key-change-this-in-production-minimum-256-bits
jwt.expiration=86400000

# Encryption Configuration
encryption.secret=change-this-encryption-key-in-production

# Plaid Configuration
plaid.client.id=your-plaid-client-id
plaid.secret=your-plaid-sandbox-secret
plaid.environment=sandbox
